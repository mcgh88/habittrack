<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HabitTrack">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>HabitTrack</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --accent: #e94560;
  --accent2: #ff6b6b;
  --green: #4ecca3;
  --green-dim: #2d8a6e;
  --yellow: #f0c040;
  --purple: #9b59b6;
  --text: #eaeaea;
  --text-dim: #8892a4;
  --text-faint: #555e70;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --radius: 12px;
  --hc-none: transparent;
  --hc-blue: #3b82f6;
  --hc-purple: #a855f7;
  --hc-pink: #ec4899;
  --hc-orange: #f97316;
  --hc-teal: #14b8a6;
  --hc-gold: #eab308;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--sans); -webkit-tap-highlight-color: transparent; overflow: hidden;
}

/* ---- TRACK SWITCHER (pill style) ---- */
.track-switcher {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg); border-bottom: 1px solid rgba(255,255,255,0.06);
  z-index: 100; padding: 8px 16px; padding-top: calc(8px + env(safe-area-inset-top));
}
.track-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px; padding: 6px 14px 6px 12px;
  cursor: pointer; position: relative; user-select: none;
}
.track-pill-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
  flex-shrink: 0;
}
.track-pill-name {
  font-family: var(--mono); font-size: 13px; font-weight: 600;
  color: var(--text); max-width: 180px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}
.track-pill-arrow {
  font-size: 10px; color: var(--text-dim); margin-left: 2px;
}
.track-pill select {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  opacity: 0; cursor: pointer; -webkit-appearance: none; appearance: none;
}

/* ---- TAB BAR ---- */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; background: var(--surface);
  border-top: 1px solid rgba(255,255,255,0.06);
  z-index: 100; padding-bottom: env(safe-area-inset-bottom);
}
.tab-btn {
  flex: 1; padding: 10px 0 8px; border: none; background: none;
  color: var(--text-dim); font-family: var(--sans); font-size: 10px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer; transition: color 0.2s;
}
.tab-btn.active { color: var(--accent); }
.tab-btn svg { width: 20px; height: 20px; }

/* ---- PANELS ---- */
.panel {
  position: absolute; top: 48px; left: 0; right: 0; bottom: 60px;
  padding: 20px 16px 20px; overflow-y: auto; overflow-x: hidden;
  display: none; -webkit-overflow-scrolling: touch;
}
.panel.active { display: block; }
.panel-header {
  font-family: var(--mono); font-size: 22px; font-weight: 700;
  margin-bottom: 20px; color: var(--text); letter-spacing: -0.5px;
}

/* ---- DAY PANEL ---- */
.date-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.date-nav button {
  background: var(--surface2); border: none; color: var(--text);
  width: 36px; height: 36px; border-radius: 50%; font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.date-nav .date-label { font-family: var(--mono); font-size: 16px; font-weight: 600; cursor: pointer; }
.date-nav .date-label.today-highlight { color: var(--accent); }

/* Score area with tentative/final */
.score-area { margin-bottom: 16px; }
.score-summary {
  display: flex; justify-content: center; align-items: center;
  background: var(--surface); border-radius: var(--radius);
  padding: 20px 16px; flex-direction: column; gap: 4px;
}
.score-summary .score-value { font-family: var(--mono); font-size: 42px; font-weight: 700; }
.score-summary .score-label { font-size: 13px; color: var(--text-dim); }
.score-dual {
  display: flex; gap: 8px; margin-bottom: 0;
}
.score-dual .score-summary { flex: 1; padding: 14px 10px; }
.score-dual .score-value { font-size: 28px; }
.score-bar-wrap { height: 6px; background: var(--surface); border-radius: 3px; margin-bottom: 20px; overflow: hidden; margin-top: 10px; }
.score-bar { height: 100%; border-radius: 3px; transition: width 0.4s ease, background 0.4s ease; background: var(--green); }
.habit-list { margin-bottom: 16px; }
.habit-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px; background: var(--surface);
  border-radius: 8px; margin-bottom: 6px; font-size: 14px;
  border-left: 4px solid transparent;
  transition: background 0.2s;
}
.habit-item[data-color="blue"]   { border-left-color: var(--hc-blue); }
.habit-item[data-color="purple"] { border-left-color: var(--hc-purple); }
.habit-item[data-color="pink"]   { border-left-color: var(--hc-pink); }
.habit-item[data-color="orange"] { border-left-color: var(--hc-orange); }
.habit-item[data-color="teal"]   { border-left-color: var(--hc-teal); }
.habit-item[data-color="gold"]   { border-left-color: var(--hc-gold); }
.tinted-bg .habit-item[data-color="blue"]   { background: rgba(59,130,246,0.08); }
.tinted-bg .habit-item[data-color="purple"] { background: rgba(168,85,247,0.08); }
.tinted-bg .habit-item[data-color="pink"]   { background: rgba(236,72,153,0.08); }
.tinted-bg .habit-item[data-color="orange"] { background: rgba(249,115,22,0.08); }
.tinted-bg .habit-item[data-color="teal"]   { background: rgba(20,184,166,0.08); }
.tinted-bg .habit-item[data-color="gold"]   { background: rgba(234,179,8,0.08); }
.habit-item .habit-name { flex: 1; margin-right: 8px; word-break: break-word; font-family: var(--mono); font-size: 13px; }
.habit-item .habit-buttons { display: flex; gap: 4px; }
.mark-btn {
  width: 36px; height: 32px; border: 1px solid var(--text-faint);
  border-radius: 6px; background: var(--bg); color: var(--text-dim);
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.mark-btn.selected-s { background: var(--green); color: var(--bg); border-color: var(--green); }
.mark-btn.selected-f { background: var(--accent); color: white; border-color: var(--accent); }
.mark-btn.selected-na { background: var(--surface2); color: var(--text); border-color: var(--text-dim); }

/* ---- ALL-TRACKS DASHBOARD ---- */
.all-dashboard { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.track-summary-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 14px 16px; display: flex; justify-content: space-between;
  align-items: center; cursor: pointer; transition: background 0.15s;
  border-left: 4px solid var(--text-faint);
}
.track-summary-card:active { background: var(--surface2); }
.track-summary-card .track-card-name { font-family: var(--mono); font-size: 14px; font-weight: 600; }
.track-summary-card .track-card-score { font-family: var(--mono); font-size: 22px; font-weight: 700; }
.track-summary-card .track-card-detail { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.track-summary-card .track-card-status {
  font-size: 10px; font-family: var(--mono); margin-top: 3px;
  padding: 2px 6px; border-radius: 4px; display: inline-block;
}
.track-card-status.tentative { background: rgba(240,192,64,0.15); color: var(--yellow); }
.track-card-status.final { background: rgba(78,204,163,0.15); color: var(--green); }
.track-card-status.empty { color: var(--text-faint); }

/* ---- BUTTONS ---- */
.btn {
  padding: 10px 20px; border: none; border-radius: 8px;
  font-family: var(--sans); font-size: 14px; font-weight: 600;
  cursor: pointer; transition: transform 0.1s, opacity 0.2s;
}
.btn:active { transform: scale(0.97); }
.btn-accent { background: var(--accent); color: white; }
.btn-green { background: var(--green); color: var(--bg); }
.btn-outline { background: none; border: 1px solid var(--text-faint); color: var(--text); }
.btn-sm { padding: 8px 14px; font-size: 12px; }
.btn-block { width: 100%; }
.btn-danger { background: rgba(233,69,96,0.15); color: var(--accent); border: 1px solid var(--accent); }
.btn:disabled { opacity: 0.4; cursor: default; }
.no-habits-msg { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 14px; }

/* ---- HABITS EDIT ---- */
.habit-edit-item {
  background: var(--surface); border-radius: var(--radius);
  padding: 12px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
  border-left: 4px solid transparent;
  transition: transform 0.15s, box-shadow 0.15s; position: relative;
}
.habit-edit-item[data-color="blue"]   { border-left-color: var(--hc-blue); }
.habit-edit-item[data-color="purple"] { border-left-color: var(--hc-purple); }
.habit-edit-item[data-color="pink"]   { border-left-color: var(--hc-pink); }
.habit-edit-item[data-color="orange"] { border-left-color: var(--hc-orange); }
.habit-edit-item[data-color="teal"]   { border-left-color: var(--hc-teal); }
.habit-edit-item[data-color="gold"]   { border-left-color: var(--hc-gold); }
.tinted-bg .habit-edit-item[data-color="blue"]   { background: rgba(59,130,246,0.08); }
.tinted-bg .habit-edit-item[data-color="purple"] { background: rgba(168,85,247,0.08); }
.tinted-bg .habit-edit-item[data-color="pink"]   { background: rgba(236,72,153,0.08); }
.tinted-bg .habit-edit-item[data-color="orange"] { background: rgba(249,115,22,0.08); }
.tinted-bg .habit-edit-item[data-color="teal"]   { background: rgba(20,184,166,0.08); }
.tinted-bg .habit-edit-item[data-color="gold"]   { background: rgba(234,179,8,0.08); }
.drag-handle {
  cursor: grab; color: var(--text-faint); padding: 4px 2px;
  display: flex; align-items: center; touch-action: none; flex-shrink: 0;
}
.drag-handle:active { cursor: grabbing; }
.drag-handle svg { width: 16px; height: 16px; }
.habit-edit-item input[type="text"] {
  flex: 1; background: var(--bg); border: 1px solid var(--text-faint);
  color: var(--text); font-family: var(--mono); font-size: 13px;
  padding: 8px 10px; border-radius: 8px; outline: none; min-width: 0;
}
.habit-edit-item input[type="text"]:focus { border-color: var(--accent); }
.color-pick-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--text-faint); cursor: pointer;
  background: var(--bg); flex-shrink: 0; position: relative;
  transition: border-color 0.15s;
}
.color-pick-btn:hover { border-color: var(--text-dim); }
.color-pick-btn[data-color="none"]   { background: var(--bg); }
.color-pick-btn[data-color="blue"]   { background: var(--hc-blue); border-color: var(--hc-blue); }
.color-pick-btn[data-color="purple"] { background: var(--hc-purple); border-color: var(--hc-purple); }
.color-pick-btn[data-color="pink"]   { background: var(--hc-pink); border-color: var(--hc-pink); }
.color-pick-btn[data-color="orange"] { background: var(--hc-orange); border-color: var(--hc-orange); }
.color-pick-btn[data-color="teal"]   { background: var(--hc-teal); border-color: var(--hc-teal); }
.color-pick-btn[data-color="gold"]   { background: var(--hc-gold); border-color: var(--hc-gold); }
.color-popup {
  position: absolute; top: 100%; right: 0;
  background: var(--surface2); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; padding: 8px; display: none;
  flex-wrap: wrap; gap: 6px; z-index: 60;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  width: 170px; justify-content: center;
}
.color-popup.show { display: flex; }
.color-swatch {
  width: 30px; height: 30px; border-radius: 50%;
  border: 2px solid transparent; cursor: pointer;
  transition: transform 0.1s, border-color 0.15s;
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.active { border-color: white; }
.color-swatch[data-c="none"]   { background: var(--bg); border-color: var(--text-faint); }
.color-swatch[data-c="blue"]   { background: var(--hc-blue); }
.color-swatch[data-c="purple"] { background: var(--hc-purple); }
.color-swatch[data-c="pink"]   { background: var(--hc-pink); }
.color-swatch[data-c="orange"] { background: var(--hc-orange); }
.color-swatch[data-c="teal"]   { background: var(--hc-teal); }
.color-swatch[data-c="gold"]   { background: var(--hc-gold); }
.habit-edit-item .delete-habit-btn {
  background: none; border: none; color: var(--text-faint);
  font-size: 18px; cursor: pointer; padding: 4px 8px; flex-shrink: 0;
}
.habit-edit-item .delete-habit-btn:hover { color: var(--accent); }

/* ---- TRACKS TAB ---- */
.track-edit-item {
  background: var(--surface); border-radius: var(--radius);
  padding: 12px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.track-edit-item input[type="text"] {
  flex: 1; background: var(--bg); border: 1px solid var(--text-faint);
  color: var(--text); font-family: var(--mono); font-size: 14px;
  padding: 8px 10px; border-radius: 8px; outline: none; min-width: 0;
}
.track-edit-item input[type="text"]:focus { border-color: var(--accent); }
.track-edit-item .delete-track-btn {
  background: none; border: none; color: var(--text-faint);
  font-size: 18px; cursor: pointer; padding: 4px 8px; flex-shrink: 0;
}
.track-edit-item .delete-track-btn:hover { color: var(--accent); }
.track-edit-item .import-track-btn {
  background: none; border: 1px solid var(--text-faint); color: var(--text-dim);
  font-size: 11px; font-family: var(--mono); cursor: pointer;
  padding: 4px 8px; border-radius: 6px; flex-shrink: 0;
  transition: color 0.15s, border-color 0.15s;
}
.track-edit-item .import-track-btn:hover { color: var(--text); border-color: var(--text-dim); }
.track-habit-count { font-family: var(--mono); font-size: 11px; color: var(--text-dim); white-space: nowrap; }

/* ---- CALENDAR ---- */
.range-label { font-family: var(--mono); font-size: 12px; color: var(--text-dim); text-align: center; margin-bottom: 12px; }
.legend { display: flex; gap: 12px; justify-content: center; margin-bottom: 16px; font-size: 11px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-nav button {
  background: var(--surface2); border: none; color: var(--text);
  width: 36px; height: 36px; border-radius: 50%; font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.cal-month-label { font-family: var(--mono); font-size: 16px; font-weight: 600; color: var(--text); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 16px; }
.cal-header-cell { text-align: center; font-family: var(--mono); font-size: 11px; color: var(--text-faint); padding: 4px 0; font-weight: 600; }
.cal-cell {
  height: 44px; max-height: 44px; overflow: hidden; border-radius: 8px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 13px; font-weight: 600; position: relative; cursor: default;
}
.cal-cell.empty { background: none; }
.cal-cell.out-of-range { background: none; color: var(--text-faint); opacity: 0.3; }
.cal-cell.missed { background: none; color: var(--text-dim); border: 1px solid rgba(255,255,255,0.06); }
.cal-cell.future { background: rgba(255,255,255,0.02); color: var(--text-faint); border: 1px dashed rgba(255,255,255,0.06); }
.cal-cell.scored { color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
.cal-cell.scored .cal-score { font-size: 9px; font-weight: 400; opacity: 0.85; margin-top: 1px; }

/* ---- SETTINGS ---- */
.setting-group { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.setting-group h3 { font-family: var(--mono); font-size: 14px; color: var(--text-dim); margin-bottom: 12px; }
.setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.setting-row:last-child { margin-bottom: 0; }
.setting-row label { font-size: 14px; }
.setting-row input, .setting-row select {
  background: var(--bg); border: 1px solid var(--text-faint);
  color: var(--text); font-family: var(--mono); font-size: 14px;
  padding: 8px 10px; border-radius: 8px; outline: none; width: 160px; text-align: right;
}
.setting-row input:focus, .setting-row select:focus { border-color: var(--accent); }
.toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.toggle-switch {
  position: relative; width: 44px; height: 24px; cursor: pointer; flex-shrink: 0;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: var(--text-faint); border-radius: 12px; transition: background 0.2s;
}
.toggle-slider::before {
  content: ''; position: absolute; width: 18px; height: 18px;
  left: 3px; bottom: 3px; background: white; border-radius: 50%;
  transition: transform 0.2s;
}
.toggle-switch input:checked + .toggle-slider { background: var(--green); }
.toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }

/* ---- MISC ---- */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); color: var(--text); padding: 10px 20px;
  border-radius: 20px; font-size: 13px; font-family: var(--sans);
  opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200;
  white-space: nowrap; max-width: 90%;
}
.toast.show { opacity: 1; }
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); z-index: 300;
  display: none; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius);
  padding: 24px; width: 100%; max-width: 400px; max-height: 80vh; overflow-y: auto;
}
.modal h2 { font-family: var(--mono); font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.modal p { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; line-height: 1.5; }
.modal textarea {
  width: 100%; min-height: 140px; background: var(--bg);
  border: 1px solid var(--text-faint); border-radius: 8px;
  color: var(--text); font-family: var(--mono); font-size: 13px;
  padding: 12px; outline: none; resize: vertical; margin-bottom: 12px;
}
.modal textarea:focus { border-color: var(--accent); }
.modal textarea::placeholder { color: var(--text-faint); }
.modal-buttons { display: flex; gap: 8px; }
.modal-msg { font-family: var(--mono); font-size: 12px; padding: 8px 0 0; min-height: 20px; }
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-thumb { background: var(--text-faint); border-radius: 2px; }
.no-data { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 14px; }
.danger-zone { margin-top: 24px; }
.disabled-panel-msg { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 14px; font-family: var(--mono); }
input[type="date"] { -webkit-appearance: none; }
@media (max-width: 380px) {
  .score-summary .score-value { font-size: 34px; }
  .score-dual .score-value { font-size: 22px; }
  .habit-item .habit-name { font-size: 12px; }
}
</style>
</head>
<body>

<!-- TRACK SWITCHER (pill) -->
<div class="track-switcher">
  <div class="track-pill">
    <div class="track-pill-dot"></div>
    <span class="track-pill-name" id="track-pill-name">All Tracks</span>
    <span class="track-pill-arrow">&#9662;</span>
    <select id="track-select"></select>
  </div>
</div>

<!-- TAB BAR -->
<nav class="tab-bar">
  <button class="tab-btn active" data-tab="day">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Today
  </button>
  <button class="tab-btn" data-tab="habits">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    Habits
  </button>
  <button class="tab-btn" data-tab="calendar">

<script>
const MAX_ITEMS = 15;
const MAX_NAME_LENGTH = 50;
const STORAGE_KEY = 'habittrack_data';
const HABIT_COLORS = ['none','blue','purple','pink','orange','teal','gold'];

// ============================================================
// DATA LAYER
// ============================================================
function todayStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function parseDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function formatDate(s){const d=parseDate(s);const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;}
function addDays(dateStr,n){const d=parseDate(dateStr);d.setDate(d.getDate()+n);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

function defaultTrack(){return{habits:[],days:{},drafts:{}};}
function defaultStore(){
  return{
    settings:{colorMode:'two',thresh1:80,thresh2:50,startDate:todayStr(),weeks:12,tintedBg:true},
    activeTrack:'__all__',
    trackOrder:['default'],
    trackNames:{default:'My Habits'},
    tracks:{default:defaultTrack()}
  };
}

function migrateStore(data){
  if(!data.tracks){
    const oldHabits=(data.habits||[]).map(h=>({name:h.name,color:h.color||'none'}));
    const oldDays=data.days||{};
    const oldDrafts=data.drafts||{};
    Object.values(oldDays).forEach(d=>{if(d.items)d.items.forEach(it=>{delete it.weight;});});
    Object.keys(oldDrafts).forEach(dateStr=>{
      const draft=oldDrafts[dateStr];
      if(draft&&!draft.habits)draft.habits=oldHabits.map(h=>({name:h.name,color:h.color||'none'}));
    });
    data.tracks={default:{habits:oldHabits,days:oldDays,drafts:oldDrafts}};
    data.trackOrder=['default'];
    data.trackNames={default:'My Habits'};
    data.activeTrack='default';
    delete data.habits;delete data.days;delete data.drafts;
  }
  if(!data.settings)data.settings=defaultStore().settings;
  if(data.settings.tintedBg===undefined)data.settings.tintedBg=true;
  if(!data.trackOrder)data.trackOrder=['default'];
  if(!data.trackNames)data.trackNames={default:'My Habits'};
  if(!data.activeTrack)data.activeTrack=data.trackOrder[0]||'__all__';
  data.trackOrder.forEach(id=>{
    if(!data.tracks[id])data.tracks[id]=defaultTrack();
    const t=data.tracks[id];
    if(!t.habits)t.habits=[];if(!t.days)t.days={};if(!t.drafts)t.drafts={};
    t.habits.forEach(h=>{delete h.weight;if(!h.color)h.color='none';});
    Object.values(t.days).forEach(d=>{if(d.items)d.items.forEach(it=>{delete it.weight;});});
  });
  return data;
}

function getStore(){
  try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return defaultStore();return migrateStore(JSON.parse(raw));}catch{return defaultStore();}
}
function saveStore(s){localStorage.setItem(STORAGE_KEY,JSON.stringify(s));}
function getTrack(id){return store.tracks[id]||defaultTrack();}
function activeTrackId(){return store.activeTrack;}
function isAllView(){return store.activeTrack==='__all__';}
function getEndDate(){return addDays(store.settings.startDate,store.settings.weeks*7);}
function getDateRange(){const s=store.settings.startDate,e=getEndDate(),dates=[];let cur=s;while(cur<=e){dates.push(cur);cur=addDays(cur,1);}return dates;}

function calcScore(items,marks){
  let success=0,applicable=0;
  items.forEach((h,i)=>{if(marks[i]==='na')return;applicable++;if(marks[i]==='s')success++;});
  return applicable===0?0:(success/applicable)*100;
}
function isAllMarked(marks){return marks.length>0&&marks.every(m=>m!==null);}
function hasAnyMark(marks){return marks.some(m=>m!==null);}

function getScoreColor(score){
  const s=store.settings;
  if(s.colorMode==='three'){if(score>=s.thresh1)return'good';if(score>=s.thresh2)return'warn';return'bad';}
  return score>=s.thresh1?'good':'bad';
}
function getScoreCSSColor(score){const c=getScoreColor(score);return c==='good'?'var(--green)':c==='warn'?'var(--yellow)':'var(--accent)';}
function generateId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

let store=getStore();
let currentDate=todayStr();
let editHabits=null;
let openColorPopup=null;
let importTargetTrackId=null;

// ============================================================
// TINTED BG
// ============================================================
function applyTintedBg(){
  if(store.settings.tintedBg)document.body.classList.add('tinted-bg');
  else document.body.classList.remove('tinted-bg');
}
applyTintedBg();

// ============================================================
// TRACK SWITCHER
// ============================================================
function renderTrackSelect(){
  const sel=document.getElementById('track-select');
  const pillName=document.getElementById('track-pill-name');
  sel.innerHTML='<option value="__all__">All Tracks</option>';
  let activeName='All Tracks';
  store.trackOrder.forEach(id=>{
    const name=store.trackNames[id]||id;
    sel.innerHTML+=`<option value="${id}"${store.activeTrack===id?' selected':''}>${escHtml(name)}</option>`;
    if(store.activeTrack===id)activeName=name;
  });
  if(store.activeTrack==='__all__')sel.value='__all__';
  pillName.textContent=activeName;
}

document.getElementById('track-select').addEventListener('change',(e)=>{
  store.activeTrack=e.target.value;
  saveStore(store);renderTrackSelect();refreshCurrentTab();
});

function refreshCurrentTab(){
  const activeTab=document.querySelector('.tab-btn.active');
  if(activeTab){
    const tab=activeTab.dataset.tab;
    if(tab==='day')renderDay();
    if(tab==='habits')renderHabitsEdit();
    if(tab==='calendar')renderCalendar();
    if(tab==='tracks')renderTracksEdit();
  }
  updatePanelVisibility();
}

function updatePanelVisibility(){
  const all=isAllView();
  document.getElementById('day-content-single').style.display=all?'none':'block';
  document.getElementById('day-content-all').style.display=all?'block':'none';
  document.getElementById('habits-content-active').style.display=all?'none':'block';
  document.getElementById('habits-content-all').style.display=all?'block':'none';
}

// ============================================================
// TAB NAVIGATION
// ============================================================
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
    if(btn.dataset.tab==='day')renderDay();
    if(btn.dataset.tab==='habits')renderHabitsEdit();
    if(btn.dataset.tab==='calendar')renderCalendar();
    if(btn.dataset.tab==='tracks')renderTracksEdit();
    if(btn.dataset.tab==='settings')loadSettings();
    updatePanelVisibility();
  });
});

document.addEventListener('click',(e)=>{
  if(!e.target.closest('.color-pick-btn')&&!e.target.closest('.color-popup'))closeAllColorPopups();
});
function closeAllColorPopups(){document.querySelectorAll('.color-popup.show').forEach(p=>p.classList.remove('show'));openColorPopup=null;}

// ============================================================
// GET HABITS FOR A DATE (uses draft snapshot or current habits)
// ============================================================
function getHabitsForDate(trackId,dateStr){
  const track=getTrack(trackId);
  const draft=track.drafts[dateStr];
  if(draft&&draft.habits)return draft.habits;
  // No draft = show current track habits
  return track.habits;
}

function getMarksForDate(trackId,dateStr){
  const track=getTrack(trackId);
  const draft=track.drafts[dateStr];
  if(draft&&draft.marks)return draft.marks;
  return new Array(track.habits.length).fill(null);
}

function ensureDraft(trackId,dateStr){
  const track=getTrack(trackId);
  if(!track.drafts[dateStr]){
    track.drafts[dateStr]={
      habits:track.habits.map(h=>({name:h.name,color:h.color||'none'})),
      marks:new Array(track.habits.length).fill(null)
    };
  }
  const draft=track.drafts[dateStr];
  if(!draft.habits)draft.habits=track.habits.map(h=>({name:h.name,color:h.color||'none'}));
  while(draft.marks.length<draft.habits.length)draft.marks.push(null);
  if(draft.marks.length>draft.habits.length)draft.marks.length=draft.habits.length;
  return draft;
}

// ============================================================
// SCORE RENDERING HELPERS
// ============================================================
function renderScoreArea(container,items,marks){
  const any=hasAnyMark(marks);
  const all=isAllMarked(marks);

  if(!any||items.length===0){
    container.innerHTML=`
      <div class="score-summary">
        <div class="score-value" style="color:var(--text-dim)">&mdash;</div>
        <div class="score-label">mark habits below</div>
      </div>`;
    return;
  }

  const tentativeScore=calcScore(items,marks.map(m=>m===null?'na':m));
  const finalScore=all?calcScore(items,marks):null;

  if(all){
    // Show single final score
    container.innerHTML=`
      <div class="score-summary">
        <div class="score-value" style="color:${getScoreCSSColor(finalScore)}">${Math.round(finalScore)}%</div>
        <div class="score-label">final score</div>
      </div>
      <div class="score-bar-wrap"><div class="score-bar" style="width:${Math.min(finalScore,100)}%;background:${getScoreCSSColor(finalScore)}"></div></div>`;
  }else{
    // Show dual: tentative + final placeholder
    container.innerHTML=`
      <div class="score-dual">
        <div class="score-summary">
          <div class="score-value" style="color:${getScoreCSSColor(tentativeScore)}">${Math.round(tentativeScore)}%</div>
          <div class="score-label">tentative</div>
        </div>
        <div class="score-summary">
          <div class="score-value" style="color:var(--text-faint)">&mdash;</div>
          <div class="score-label">final</div>
        </div>
      </div>
      <div class="score-bar-wrap"><div class="score-bar" style="width:${Math.min(tentativeScore,100)}%;background:${getScoreCSSColor(tentativeScore)};opacity:0.5"></div></div>`;
  }
}

// ============================================================
// DAY PANEL — SINGLE TRACK
// ============================================================
function renderDay(){
  updatePanelVisibility();
  const isTodayDate=currentDate===todayStr();
  const label=document.getElementById('current-date-label');
  label.textContent=isTodayDate?'Today \u2014 '+formatDate(currentDate):formatDate(currentDate);
  label.classList.toggle('today-highlight',isTodayDate);

  if(isAllView()){renderAllDashboard();return;}

  const trackId=activeTrackId();
  const items=getHabitsForDate(trackId,currentDate);
  const marks=getMarksForDate(trackId,currentDate);
  const scoreArea=document.getElementById('score-area');
  const listEl=document.getElementById('day-habit-list');

  if(items.length===0){
    scoreArea.innerHTML=`
      <div class="score-summary">
        <div class="score-value" style="color:var(--text-dim)">&mdash;</div>
        <div class="score-label">no habits defined</div>
      </div>`;
    listEl.innerHTML='<div class="no-habits-msg">No habits defined yet.<br>Go to the Habits tab to add some.</div>';
    return;
  }

  renderScoreArea(scoreArea,items,marks);

  listEl.innerHTML='';
  items.forEach((h,i)=>{
    const div=document.createElement('div');
    div.className='habit-item';
    const color=h.color||'none';
    if(color!=='none')div.setAttribute('data-color',color);
    const mark=marks[i];
    div.innerHTML=`
      <span class="habit-name">${escHtml(h.name)}</span>
      <div class="habit-buttons">
        <button class="mark-btn ${mark==='s'?'selected-s':''}" data-idx="${i}" data-mark="s">S</button>
        <button class="mark-btn ${mark==='f'?'selected-f':''}" data-idx="${i}" data-mark="f">F</button>
        <button class="mark-btn ${mark==='na'?'selected-na':''}" data-idx="${i}" data-mark="na">n/a</button>
      </div>`;
    listEl.appendChild(div);
  });

  listEl.querySelectorAll('.mark-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const idx=parseInt(btn.dataset.idx);const mark=btn.dataset.mark;
      // Ensure draft exists when user first interacts
      const draft=ensureDraft(trackId,currentDate);
      draft.marks[idx]=draft.marks[idx]===mark?null:mark;
      saveStore(store);renderDay();
    });
  });
}

// ============================================================
// DAY PANEL — ALL TRACKS DASHBOARD
// ============================================================
function renderAllDashboard(){
  const dashboard=document.getElementById('all-dashboard');
  const scoreArea=document.getElementById('all-score-area');
  dashboard.innerHTML='';

  const trackScores=[];
  let allTracksComplete=true;
  let anyTrackHasMarks=false;

  store.trackOrder.forEach(trackId=>{
    const track=getTrack(trackId);
    const name=store.trackNames[trackId]||trackId;
    const items=getHabitsForDate(trackId,currentDate);
    const marks=getMarksForDate(trackId,currentDate);
    const any=hasAnyMark(marks);
    const all=isAllMarked(marks)&&items.length>0;

    let score=null;let statusClass='empty';let statusText='No marks';

    if(any){
      anyTrackHasMarks=true;
      score=calcScore(items,marks.map(m=>m===null?'na':m));
      if(all){statusClass='final';statusText='Final';}
      else{statusClass='tentative';statusText='Tentative';allTracksComplete=false;}
    }else{
      allTracksComplete=false;
    }

    if(items.length===0){allTracksComplete=false;}

    const card=document.createElement('div');
    card.className='track-summary-card';
    card.innerHTML=`
      <div>
        <div class="track-card-name">${escHtml(name)}</div>
        <span class="track-card-status ${statusClass}">${statusText}</span>
      </div>
      <div class="track-card-score" style="color:${score!==null?getScoreCSSColor(score):'var(--text-faint)'}">${score!==null?Math.round(score)+'%':'\u2014'}</div>`;
    card.addEventListener('click',()=>{
      store.activeTrack=trackId;saveStore(store);
      renderTrackSelect();refreshCurrentTab();
    });
    dashboard.appendChild(card);
    if(score!==null)trackScores.push(score);
  });

  // Combined score
  if(!anyTrackHasMarks||trackScores.length===0){
    scoreArea.innerHTML=`
      <div class="score-summary">
        <div class="score-value" style="color:var(--text-faint)">&mdash;</div>
        <div class="score-label">combined score</div>
      </div>`;
  }else{
    const combined=trackScores.reduce((a,b)=>a+b,0)/trackScores.length;
    if(allTracksComplete){
      scoreArea.innerHTML=`
        <div class="score-summary">
          <div class="score-value" style="color:${getScoreCSSColor(combined)}">${Math.round(combined)}%</div>
          <div class="score-label">combined final</div>
        </div>
        <div class="score-bar-wrap"><div class="score-bar" style="width:${Math.min(combined,100)}%;background:${getScoreCSSColor(combined)}"></div></div>`;
    }else{
      scoreArea.innerHTML=`
        <div class="score-dual">
          <div class="score-summary">
            <div class="score-value" style="color:${getScoreCSSColor(combined)}">${Math.round(combined)}%</div>
            <div class="score-label">tentative</div>
          </div>
          <div class="score-summary">
            <div class="score-value" style="color:var(--text-faint)">&mdash;</div>
            <div class="score-label">final</div>
          </div>
        </div>
        <div class="score-bar-wrap"><div class="score-bar" style="width:${Math.min(combined,100)}%;background:${getScoreCSSColor(combined)};opacity:0.5"></div></div>`;
    }
  }
}

// ============================================================
// DAY NAVIGATION
// ============================================================

document.getElementById('next-day').addEventListener('click',()=>{currentDate=addDays(currentDate,1);renderDay();});

// ============================================================
// HABITS EDIT
// ============================================================
function renderHabitsEdit(){
  updatePanelVisibility();
  if(isAllView())return;
  const track=getTrack(activeTrackId());
  editHabits=track.habits.map(h=>({name:h.name,color:h.color||'none'}));
  renderHabitsEditList();
}

function renderHabitsEditList(){
  const list=document.getElementById('habits-edit-list');
  list.innerHTML='';
  editHabits.forEach((h,i)=>{
    const div=document.createElement('div');
    div.className='habit-edit-item';
    div.setAttribute('data-idx',i);
    if(h.color&&h.color!=='none')div.setAttribute('data-color',h.color);
    div.innerHTML=`
      <div class="drag-handle" data-idx="${i}">
        <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="5" cy="3" r="1.5"/><circle cx="11" cy="3" r="1.5"/><circle cx="5" cy="8" r="1.5"/><circle cx="11" cy="8" r="1.5"/><circle cx="5" cy="13" r="1.5"/><circle cx="11" cy="13" r="1.5"/></svg>
      </div>
      <input type="text" value="${escHtml(h.name)}" maxlength="${MAX_NAME_LENGTH}" placeholder="Habit name..." data-idx="${i}" class="habit-name-input">
      <div style="position:relative;">
        <button class="color-pick-btn" data-idx="${i}" data-color="${h.color||'none'}"></button>
        <div class="color-popup" data-idx="${i}">
          ${HABIT_COLORS.map(c=>`<div class="color-swatch ${h.color===c?'active':''}" data-c="${c}" data-idx="${i}"></div>`).join('')}
        </div>
      </div>
      <button class="delete-habit-btn" data-idx="${i}">&times;</button>`;
    list.appendChild(div);
  });

  list.querySelectorAll('.habit-name-input').forEach(inp=>{
    inp.addEventListener('input',()=>{editHabits[parseInt(inp.dataset.idx)].name=inp.value.slice(0,MAX_NAME_LENGTH);});
  });
  list.querySelectorAll('.delete-habit-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{editHabits.splice(parseInt(btn.dataset.idx),1);renderHabitsEditList();});
  });
  list.querySelectorAll('.color-pick-btn').forEach(btn=>{
    btn.addEventListener('click',(e)=>{
      e.stopPropagation();const idx=btn.dataset.idx;
      const popup=list.querySelector(`.color-popup[data-idx="${idx}"]`);
      const wasOpen=popup.classList.contains('show');
      closeAllColorPopups();
      if(!wasOpen){popup.classList.add('show');openColorPopup=popup;}
    });
  });
  list.querySelectorAll('.color-swatch').forEach(sw=>{
    sw.addEventListener('click',(e)=>{
      e.stopPropagation();const idx=parseInt(sw.dataset.idx);const color=sw.dataset.c;
      editHabits[idx].color=color;closeAllColorPopups();renderHabitsEditList();
    });
  });
  list.querySelectorAll('.drag-handle').forEach(handle=>{
    handle.addEventListener('touchstart',handleDragStart,{passive:false});
  });

  document.getElementById('add-habit-btn').style.display=editHabits.length>=MAX_ITEMS?'none':'flex';
  document.getElementById('habits-save-msg').textContent='';
}

// ============================================================
// SAVE HABITS (auto-pushes to today)
// ============================================================
document.getElementById('add-habit-btn').addEventListener('click',()=>{
  if(editHabits.length>=MAX_ITEMS)return;
  editHabits.push({name:'',color:'none'});
  renderHabitsEditList();
  const inputs=document.querySelectorAll('.habit-name-input');
  if(inputs.length>0)inputs[inputs.length-1].focus();
});

document.getElementById('save-habits-btn').addEventListener('click',()=>{
  if(isAllView())return;
  const msgEl=document.getElementById('habits-save-msg');
  if(editHabits.some(h=>h.name.trim()==='')){msgEl.textContent='All habits must have a name.';msgEl.style.color='var(--accent)';return;}

  const trackId=activeTrackId();
  const track=getTrack(trackId);
  const newHabits=editHabits.map(h=>({name:h.name.trim(),color:h.color||'none'}));

  // Auto-push to today: preserve matching marks
  const today=todayStr();
  const draft=track.drafts[today];
  const oldHabits=draft?draft.habits:null;
  const oldMarks=draft?draft.marks:null;

  const newMarks=newHabits.map(h=>{
    if(oldHabits&&oldMarks){
      const matchIdx=oldHabits.findIndex(oh=>oh.name===h.name);
      if(matchIdx!==-1&&oldMarks[matchIdx])return oldMarks[matchIdx];
    }
    return null;
  });

  track.habits=newHabits;
  track.drafts[today]={habits:newHabits.map(h=>({...h})),marks:newMarks};
  saveStore(store);
  msgEl.textContent='Saved \u2713';msgEl.style.color='var(--green)';
  showToast('Habits saved');
});

// ============================================================
// TOUCH DRAG REORDER
// ============================================================
function handleDragStart(e){
  e.preventDefault();
  const handle=e.currentTarget;const idx=parseInt(handle.dataset.idx);
  const item=handle.closest('.habit-edit-item');
  const list=document.getElementById('habits-edit-list');
  const rect=item.getBoundingClientRect();const touch=e.touches[0];
  const ghost=item.cloneNode(true);
  ghost.style.position='fixed';ghost.style.width=rect.width+'px';
  ghost.style.left=rect.left+'px';ghost.style.top=rect.top+'px';
  ghost.style.zIndex='500';ghost.style.pointerEvents='none';
  ghost.style.opacity='0.9';ghost.style.boxShadow='0 8px 32px rgba(0,0,0,0.5)';
  ghost.style.transform='scale(1.03)';ghost.style.transition='none';
  document.body.appendChild(ghost);item.style.opacity='0.3';
  const offsetY=touch.clientY-rect.top;let currentIdx=idx;

  function onTouchMove(ev){
    ev.preventDefault();const t=ev.touches[0];
    ghost.style.top=(t.clientY-offsetY)+'px';
    const allItems=Array.from(list.querySelectorAll('.habit-edit-item'));
    allItems.forEach(it=>it.classList.remove('drag-over-above','drag-over-below'));
    for(let i=0;i<allItems.length;i++){
      const r=allItems[i].getBoundingClientRect();const midY=r.top+r.height/2;
      if(t.clientY>=r.top&&t.clientY<=r.bottom){
        if(i!==currentIdx){if(t.clientY<midY)allItems[i].classList.add('drag-over-above');else allItems[i].classList.add('drag-over-below');}
        break;
      }
    }
  }
  function onTouchEnd(ev){
    document.removeEventListener('touchmove',onTouchMove);
    document.removeEventListener('touchend',onTouchEnd);
    ghost.remove();item.style.opacity='';
    const allItems=Array.from(list.querySelectorAll('.habit-edit-item'));
    allItems.forEach(it=>it.classList.remove('drag-over-above','drag-over-below'));
    const t=ev.changedTouches[0];let dropIdx=currentIdx;
    for(let i=0;i<allItems.length;i++){
      const r=allItems[i].getBoundingClientRect();
      if(t.clientY>=r.top&&t.clientY<=r.bottom){dropIdx=i;break;}
      if(i===allItems.length-1&&t.clientY>r.bottom)dropIdx=allItems.length-1;
    }
    if(dropIdx!==currentIdx){const[moved]=editHabits.splice(currentIdx,1);editHabits.splice(dropIdx,0,moved);renderHabitsEditList();}
  }
  document.addEventListener('touchmove',onTouchMove,{passive:false});
  document.addEventListener('touchend',onTouchEnd);
}

// ============================================================
// TRACKS EDIT (with import button per track)
// ============================================================
function renderTracksEdit(){
  const list=document.getElementById('tracks-edit-list');
  list.innerHTML='';
  store.trackOrder.forEach((id,i)=>{
    const name=store.trackNames[id]||id;
    const track=getTrack(id);
    const habitCount=track.habits.length;
    const div=document.createElement('div');
    div.className='track-edit-item';
    div.innerHTML=`
      <input type="text" value="${escHtml(name)}" placeholder="Track name..." data-track-id="${id}" class="track-name-input">
      <span class="track-habit-count">${habitCount}</span>
      <button class="import-track-btn" data-track-id="${id}">Import</button>
      <button class="delete-track-btn" data-track-id="${id}">&times;</button>`;
    list.appendChild(div);
  });

  list.querySelectorAll('.track-name-input').forEach(inp=>{
    inp.addEventListener('change',()=>{
      const id=inp.dataset.trackId;
      store.trackNames[id]=inp.value.trim()||'Untitled';
      saveStore(store);renderTrackSelect();
    });
  });

  list.querySelectorAll('.import-track-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      importTargetTrackId=btn.dataset.trackId;
      document.getElementById('import-text').value='';
      document.getElementById('import-msg').textContent='';
      document.getElementById('import-msg').style.color='';
      document.getElementById('import-modal').classList.add('show');
    });
  });

  list.querySelectorAll('.delete-track-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.trackId;
      if(store.trackOrder.length<=1){showToast('Need at least one track');return;}
      if(!confirm(`Delete track "${store.trackNames[id]}"? All its data will be lost.`))return;
      delete store.tracks[id];delete store.trackNames[id];
      store.trackOrder=store.trackOrder.filter(t=>t!==id);
      if(store.activeTrack===id)store.activeTrack=store.trackOrder[0]||'__all__';
      saveStore(store);renderTracksEdit();renderTrackSelect();refreshCurrentTab();
      showToast('Track deleted');
    });
  });
}

document.getElementById('add-track-btn').addEventListener('click',()=>{
  const id=generateId();
  store.trackOrder.push(id);store.trackNames[id]='New Track';
  store.tracks[id]=defaultTrack();
  saveStore(store);renderTracksEdit();renderTrackSelect();
  const inputs=document.querySelectorAll('.track-name-input');
  if(inputs.length>0){const last=inputs[inputs.length-1];last.focus();last.select();}
  showToast('Track added');
});

// ============================================================
// BULK IMPORT (now targets a specific track)
// ============================================================
document.getElementById('import-cancel-btn').addEventListener('click',()=>{document.getElementById('import-modal').classList.remove('show');importTargetTrackId=null;});
document.getElementById('import-modal').addEventListener('click',(e)=>{if(e.target===document.getElementById('import-modal')){document.getElementById('import-modal').classList.remove('show');importTargetTrackId=null;}});

document.getElementById('import-confirm-btn').addEventListener('click',()=>{
  if(!importTargetTrackId)return;
  const raw=document.getElementById('import-text').value;
  const msgEl=document.getElementById('import-msg');
  const lines=raw.split('\n')
    .map(line=>{
      let s=line.trim();
      s=s.replace(/^[\u2022\u2023\u25E6\u2043\u2219\u25AA\u25AB\u25CF\u25CB\u2013\u2014\u2010\u2011\u2012\u00B7\u00BB\u203A\u2794\u279C\u27A4\u25B6\u25B8\u25BA\u27A2\uFE63\uFF0D\u2796\u2015\u23AF\u203E\u02C9\u0332\u0333\uFE58\uFF65\u30FB\uFF0A\uFF0B\u00D7\u25C6\u25C7\u25C8\u25C9\u25CA\u25CB\u2666\u2605\u2606\u2736\u2737\u2738\u2B50\u2B51\u2023\u2043\u2219\u22C5\u2981\u2E31]*[\-\*\>\~]+\s*/,'');
      s=s.replace(/^[\u2022\u2023\u25E6\u2043\u2219\u25AA\u25AB\u25CF\u25CB\u2013\u2014\u2015\u2022\u25CF\u25CB\u25E6\u2023\u2043\u2013\u2014\-\*\>\~]+\s*/,'');
      s=s.replace(/^\d+[\.\)\:\-]\s*/,'');
      s=s.replace(/^\[.\]\s*/,'');
      return s.trim();
    })
    .filter(s=>s.length>0);

  if(lines.length===0){msgEl.textContent='No habits found. Enter one per line.';msgEl.style.color='var(--accent)';return;}

  const habits=lines.map(name=>name.slice(0,MAX_NAME_LENGTH));
  let skipped=0;let imported=habits;
  if(habits.length>MAX_ITEMS){skipped=habits.length-MAX_ITEMS;imported=habits.slice(0,MAX_ITEMS);}

  const track=getTrack(importTargetTrackId);
  track.habits=imported.map(name=>({name,color:'none'}));
  saveStore(store);renderTracksEdit();
  document.getElementById('import-modal').classList.remove('show');

  let msg=`${imported.length} habit${imported.length!==1?'s':''} imported`;
  if(skipped>0)msg+=` \u2014 ${skipped} skipped (max ${MAX_ITEMS})`;
  showToast(msg);
  importTargetTrackId=null;
  // If we're viewing the track we just imported into, refresh
  if(activeTrackId()===importTargetTrackId)renderHabitsEdit();
});

// ============================================================
// CALENDAR (only shows final scores)
// ============================================================
let calMonth=new Date().getMonth();let calYear=new Date().getFullYear();

function renderCalendar(){
  document.getElementById('cal-range-label').textContent=formatDate(store.settings.startDate)+' \u2192 '+formatDate(getEndDate())+' ('+store.settings.weeks+'w)';
  renderLegend('cal-legend');renderCalGrid();
}

function getFinalScoreForDate(dateStr){
  if(isAllView()){
    // All tracks must be fully marked
    const scores=[];
    for(const id of store.trackOrder){
      const track=getTrack(id);
      if(track.habits.length===0)return null;
      const draft=track.drafts[dateStr];
      if(!draft||!draft.marks)return null;
      if(!isAllMarked(draft.marks))return null;
      scores.push(calcScore(draft.habits||track.habits,draft.marks));
    }
    if(scores.length===0)return null;
    return scores.reduce((a,b)=>a+b,0)/scores.length;
  }else{
    const track=getTrack(activeTrackId());
    const draft=track.drafts[dateStr];
    if(!draft||!draft.marks)return null;
    if(!isAllMarked(draft.marks))return null;
    const items=draft.habits||track.habits;
    if(items.length===0)return null;
    return calcScore(items,draft.marks);
  }
}

function renderCalGrid(){
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-label').textContent=months[calMonth]+' '+calYear;
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  ['S','M','T','W','T','F','S'].forEach(d=>{const hdr=document.createElement('div');hdr.className='cal-header-cell';hdr.textContent=d;grid.appendChild(hdr);});
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=todayStr();const rangeStart=store.settings.startDate;const rangeEnd=getEndDate();
  const totalCells=42;
  for(let i=0;i<totalCells;i++){
    const day=i-firstDay+1;const cell=document.createElement('div');
    if(i<firstDay||day>daysInMonth){cell.className='cal-cell empty';grid.appendChild(cell);continue;}
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const inRange=dateStr>=rangeStart&&dateStr<=rangeEnd;
    const isFuture=dateStr>today;
    const score=getFinalScoreForDate(dateStr);

    if(!inRange){cell.className='cal-cell out-of-range';cell.textContent=day;}
    else if(score!==null){
      const colorCat=getScoreColor(score);
      const bgColor=colorCat==='good'?'rgba(78,204,163,0.75)':colorCat==='warn'?'rgba(240,192,64,0.75)':'rgba(233,69,96,0.75)';
      cell.className='cal-cell scored';cell.style.background=bgColor;
      cell.innerHTML=`<span>${day}</span><span class="cal-score">${Math.round(score)}%</span>`;
    }else if(isFuture||dateStr===today){cell.className='cal-cell future';cell.textContent=day;}
    else{cell.className='cal-cell missed';cell.textContent=day;}
    grid.appendChild(cell);
  }
}

function renderLegend(id){
  const el=document.getElementById(id);const s=store.settings;
  if(s.colorMode==='three'){
    el.innerHTML=`<div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> \u2265${s.thresh1}%</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div> \u2265${s.thresh2}%</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> <${s.thresh2}%</div>`;
  }else{
    el.innerHTML=`<div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> \u2265${s.thresh1}%</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> <${s.thresh1}%</div>`;
  }
}

document.getElementById('cal-prev-month').addEventListener('click',()=>{calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalGrid();});
document.getElementById('cal-next-month').addEventListener('click',()=>{calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalGrid();});

// SETTINGS
// ============================================================
function loadSettings(){
  const s=store.settings;
  document.getElementById('set-start-date').value=s.startDate||todayStr();
  document.getElementById('set-weeks').value=s.weeks||12;
  document.getElementById('set-color-mode').value=s.colorMode||'two';
  document.getElementById('set-thresh1').value=s.thresh1||80;
  document.getElementById('set-thresh2').value=s.thresh2||50;
  document.getElementById('set-tinted-bg').checked=s.tintedBg!==false;
  document.getElementById('build-timestamp').textContent='loaded: '+new Date().toLocaleString();
  updateSettingsUI();
}

function updateSettingsUI(){
  const mode=document.getElementById('set-color-mode').value;
  document.getElementById('thresh2-row').style.display=mode==='three'?'flex':'none';
  document.getElementById('thresh1-label').textContent='Green above (%)';
  document.getElementById('color-explain').textContent=mode==='three'
    ?'Three-tier: green \u2265 first threshold, yellow \u2265 second, red below second'
    :'Two-tier: green \u2265 threshold, red below';
}

document.getElementById('set-color-mode').addEventListener('change',updateSettingsUI);

document.getElementById('save-settings-btn').addEventListener('click',()=>{
  store.settings.startDate=document.getElementById('set-start-date').value||todayStr();
  store.settings.weeks=parseInt(document.getElementById('set-weeks').value)||12;
  store.settings.colorMode=document.getElementById('set-color-mode').value;
  store.settings.thresh1=parseInt(document.getElementById('set-thresh1').value)||80;
  store.settings.thresh2=parseInt(document.getElementById('set-thresh2').value)||50;
  store.settings.tintedBg=document.getElementById('set-tinted-bg').checked;
  saveStore(store);applyTintedBg();showToast('Settings saved');
});

document.getElementById('clear-btn').addEventListener('click',()=>{
  if(confirm('Delete ALL data? This cannot be undone.')){
    store=defaultStore();saveStore(store);showToast('All data cleared');
    renderTrackSelect();renderDay();loadSettings();
  }
});

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

// ============================================================
// INIT
// ============================================================
renderTrackSelect();
updatePanelVisibility();
renderDay();

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
